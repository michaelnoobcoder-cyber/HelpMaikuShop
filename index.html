<script>
  const story =
`Maiku-san was chilling at home...

Then he got a notification.

He saw that Mira-chan was eating egg for dinner.

That made him realise...

He ran out of eggs.

So he must go on a mission to restock eggs.

Will you help him?`;

  let i = 0;
  const speed = 35;
  const textElement = document.getElementById("text");
  const ding = document.getElementById("ding");
  const womp = document.getElementById("womp");

  // Play ding once right after the word "notification." finishes typing
  const dingTrigger = "notification.";
  const dingIndex = story.indexOf(dingTrigger) + dingTrigger.length - 1; // last char index of notification.
  let dingPlayed = false;

  function typeWriter(){
    if(i < story.length){
      textElement.innerHTML += story.charAt(i);

      if(!dingPlayed && i === dingIndex){
        dingPlayed = true;
        ding.currentTime = 0;
        ding.play().catch(()=>{});
      }

      i++;
      setTimeout(typeWriter, speed);
    } else {
      document.getElementById("choices").style.display = "block";
    }
  }

  document.getElementById("startBtn").onclick = function(){
    document.getElementById("startScreen").style.display = "none";
    typeWriter();
  }

  document.getElementById("no").onclick = function(){
    womp.currentTime = 0;
    womp.play().catch(()=>{});
    textElement.innerHTML += "<br><br>Womp womp... Mission failed.";
  }

  document.getElementById("yes").onclick = function(){
    window.location.href = "stage1.html";
  }
</script>
