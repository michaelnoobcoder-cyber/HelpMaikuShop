<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Egg Mission — Map</title>
  <style>
    html,body{height:100%;margin:0}
    body{
      background:#0b0b10;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      overflow:hidden;
    }

    /* Start overlay so audio is allowed */
    #startOverlay{
      position:fixed;inset:0;z-index:50;
      display:grid;place-items:center;
      background:rgba(0,0,0,0.70);
      padding:18px;
    }
    #startCard{
      width:min(520px,92vw);
      background:rgba(10,10,14,0.82);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:18px;
      padding:18px;
      text-align:center;
      backdrop-filter: blur(10px);
    }
    #startCard img{height:70px; image-rendering:pixelated}
    #startCard p{margin:10px 0 14px;opacity:.9}
    #startBtn{
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.10);
      color:#fff;
      padding:10px 14px;
      border-radius:14px;
      cursor:pointer;
    }
    #startBtn:hover{background:rgba(255,255,255,0.14)}

    /* Layout: map on top, HUD below */
    .wrap{
      position:fixed; inset:0;
      display:grid;
      place-items:center;
      padding:14px;
    }
    .stack{
      width:min(520px, 96vw);
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:stretch;
    }

    /* Map container */
    .map{
      position:relative;
      width:100%;
      aspect-ratio: 3 / 4; /* tall map */
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.14);
      box-shadow:0 18px 50px rgba(0,0,0,0.45);
      background:#111;
    }
    .map img.bg{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      user-select:none; pointer-events:none;
    }

    /* Maiku character */
    #maiku{
      position:absolute;
      width:86px;
      transform: translate(-50%, -65%);
      transition: left 900ms ease, top 900ms ease;
      user-select:none;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
      pointer-events:none;
    }

    /* HUD below map */
    .hud{
      background:rgba(10,10,14,0.70);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:16px;
      padding:10px 10px 12px;
      backdrop-filter: blur(8px);
      box-shadow:0 12px 30px rgba(0,0,0,0.35);
    }
    .hudTop{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      font-size:13px; opacity:0.95;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      white-space:nowrap;
    }
    #msg{margin-top:8px; font-size:14px; opacity:0.95; text-align:left}

    /* Egg choices row */
    #choices{
      margin-top:10px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .eggBtn{
      border:none;
      background:transparent;
      cursor:pointer;
      padding:0;
      transition: transform .08s ease, filter .08s ease;
    }
    .eggBtn:hover{ filter: brightness(1.05); }
    .eggBtn:active{transform:translateY(1px)}
    .eggBtn img{
      width:58px;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,0.35));
    }

    /* Result modal */
    #modal{
      position:fixed; inset:0;
      display:none; place-items:center;
      background:rgba(0,0,0,0.65);
      z-index:40;
      padding:18px;
    }
    #modalCard{
      width:min(520px,92vw);
      background:rgba(10,10,14,0.85);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:18px;
      padding:14px;
      text-align:center;
      backdrop-filter: blur(10px);
    }
    #modalCard img{
      width:min(320px, 70vw);
      max-height:48vh;
      object-fit:contain;
      display:block;
      margin:10px auto;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
    }
    #modalText{margin:6px 0 12px; opacity:.95}
    #modalBtn{
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.10);
      color:#fff;
      padding:10px 14px;
      border-radius:14px;
      cursor:pointer;
    }
    #modalBtn:hover{background:rgba(255,255,255,0.14)}
  </style>
</head>

<body>
  <!-- Start overlay -->
  <div id="startOverlay">
    <div id="startCard">
      <img src="Start.png" alt="Start">
      <p>Help Maiku reach the eggs. Pick the correct egg each stage.</p>
      <button id="startBtn">Start Stage 1 (enable sound)</button>
    </div>
  </div>

  <div class="wrap">
    <div class="stack">
      <div class="map" id="map">
        <img class="bg" src="Map.png" alt="Map">
        <img id="maiku" src="MaikuShopping.png" alt="Maiku">
      </div>

      <div class="hud">
        <div class="hudTop">
          <div class="pill" id="stagePill">Stage: 1 / 3</div>
          <div class="pill" id="goalPill">Goal: Find the good egg</div>
        </div>
        <div id="msg">Pick an egg to proceed.</div>
        <div id="choices"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal">
    <div id="modalCard">
      <div id="modalText"></div>
      <img id="modalImg" src="" alt="">
      <button id="modalBtn">Continue</button>
    </div>
  </div>

  <!-- Audio -->
  <audio id="bgm" src="Background.mp3" loop preload="auto"></audio>
  <audio id="tada" src="Tada.mp3" preload="auto"></audio>
  <audio id="womp" src="Womp%20Womp.mp3" preload="auto"></audio>
  <audio id="win"  src="Win.mp3" preload="auto"></audio>

  <script>
    // Waypoints (percent positions) matching your X path:
    // start bottom-left → right middle → left middle → end at eggs
    const WAYPOINTS = [
      { x: 18, y: 86 }, // start
      { x: 72, y: 65 }, // right-middle
      { x: 30, y: 46 }, // left-middle
      { x: 78, y: 18 }, // egg end
    ];

    // Stages: number of egg choices per stage (2, 3, 4)
    const STAGES = [
      { choices: 2 },
      { choices: 3 },
      { choices: 4 },
    ];

    const maiku = document.getElementById("maiku");
    const choicesEl = document.getElementById("choices");
    const msgEl = document.getElementById("msg");
    const stagePill = document.getElementById("stagePill");

    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");

    const modal = document.getElementById("modal");
    const modalText = document.getElementById("modalText");
    const modalImg = document.getElementById("modalImg");
    const modalBtn = document.getElementById("modalBtn");

    const bgm = document.getElementById("bgm");
    const tada = document.getElementById("tada");
    const womp = document.getElementById("womp");
    const win  = document.getElementById("win");

    // Requested volume
    bgm.volume = 0.15;

    const IMG_EGG = "Egg.png";
    const IMG_BAD = "Egg%20Bad.png";
    const IMG_GOOD = "EggGood.png";

    let stageIndex = 0;    // 0..2
    let waypointIndex = 0; // 0..3
    let goodIndex = 0;     // which egg is correct this stage
    let isFinalComplete = false;

    function playSafe(a){
      try { a.currentTime = 0; a.play().catch(()=>{}); } catch(e){}
    }

    function pauseBgmForSfx(){
      try { bgm.pause(); } catch(e){}
    }

    function resumeBgmIfAllowed(){
      if(isFinalComplete) return;
      try { bgm.play().catch(()=>{}); } catch(e){}
    }

    function setMaikuAtWaypoint(idx){
      const p = WAYPOINTS[idx];
      maiku.style.left = p.x + "%";
      maiku.style.top  = p.y + "%";
    }

    function buildEggButtons(n){
      choicesEl.innerHTML = "";
      for(let i=0;i<n;i++){
        const btn = document.createElement("button");
        btn.className = "eggBtn";
        btn.innerHTML = `<img src="${IMG_EGG}" alt="Egg ${i+1}">`;
        btn.addEventListener("click", () => handleChoice(i));
        choicesEl.appendChild(btn);
      }
    }

    function startStage(){
      const s = STAGES[stageIndex];
      stagePill.textContent = `Stage: ${stageIndex+1} / ${STAGES.length}`;

      // pick a random "good" egg slot
      goodIndex = Math.floor(Math.random() * s.choices);

      msgEl.textContent = `Stage ${stageIndex+1}: Choose 1 of ${s.choices} eggs…`;
      buildEggButtons(s.choices);
    }

    function showModal(text, imgSrc, btnLabel){
      modalText.textContent = text;
      modalImg.src = imgSrc;
      modalBtn.textContent = btnLabel;
      modal.style.display = "grid";
    }

    function hideModal(){
      modal.style.display = "none";
    }

    function handleChoice(chosen){
      // Pause background so sfx is clear
      pauseBgmForSfx();

      if(chosen === goodIndex){
        playSafe(tada);
        showModal("Correct! Maiku pops out! ✅", IMG_GOOD, (stageIndex < 2) ? "Next stage" : "Finish");

        modalBtn.onclick = () => {
          hideModal();
          proceedAfterWin();
        };
      } else {
        playSafe(womp);
        showModal("Wrong egg… it’s empty 😭", IMG_BAD, "Try again");

        modalBtn.onclick = () => {
          hideModal();
          // resume bgm before replaying stage
          resumeBgmIfAllowed();
          startStage();
        };
      }
    }

    function proceedAfterWin(){
      // Move Maiku to next waypoint
      if(waypointIndex < WAYPOINTS.length - 1){
        waypointIndex++;
        setMaikuAtWaypoint(waypointIndex);
      }

      if(stageIndex < STAGES.length - 1){
        stageIndex++;
        // resume BGM after the success moment
        setTimeout(() => {
          resumeBgmIfAllowed();
          startStage();
        }, 900);
      } else {
        // final complete
        isFinalComplete = true;
        choicesEl.innerHTML = "";
        msgEl.textContent = "Thank you for helping Maiku do the shopping! 🥚✨";

        // make sure Maiku ends at egg end, then stop bgm + play win
        setTimeout(() => {
          setMaikuAtWaypoint(WAYPOINTS.length - 1);

          try { bgm.pause(); bgm.currentTime = 0; } catch(e){}
          playSafe(win);

          showModal("Thank you for helping Maiku do the shopping! 🥚✨", IMG_GOOD, "Back to start");
          modalBtn.onclick = () => window.location.href = "index.html";
        }, 900);
      }
    }

    // Start button: enable audio & start game
    startBtn.addEventListener("click", () => {
      startOverlay.style.display = "none";
      playSafe(bgm);

      waypointIndex = 0;
      stageIndex = 0;
      isFinalComplete = false;

      setMaikuAtWaypoint(0);
      startStage();
    });

    // Initial position
    setMaikuAtWaypoint(0);
  </script>
</body>
</html>
